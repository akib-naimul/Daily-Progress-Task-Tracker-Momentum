name: Build Windows Desktop App

# Builds the Windows installer. Push a version tag (e.g. v0.1.0) to also
# publish a GitHub Release with the installer attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Match the npm (v11) that generated package-lock.json; npm 10 (Node 20)
          # mishandles platform-specific optional deps and fails `npm ci`.
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee /tmp/install.log
          code=${PIPESTATUS[0]}
          if [ $code -ne 0 ]; then
            echo "" >> /tmp/install.log
            echo "----- npm debug log -----" >> /tmp/install.log
            cat "$(npm config get cache)/_logs/"*.log >> /tmp/install.log 2>/dev/null || true
          fi
          exit $code
        env:
          # electron-builder downloads its own Electron for packaging, so we skip
          # the electron npm package's binary download here — it isn't needed to
          # build the installer and can be flaky/rate-limited on CI.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Report install failure (diagnostic)
        if: failure()
        shell: bash
        run: |
          gh issue create \
            --title "CI install diagnostic $(date -u +%Y%m%dT%H%M%SZ)" \
            --body-file /tmp/install.log || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build desktop installer
        run: npm run desktop:build
        env:
          # Authenticates Electron download for electron-builder (avoids rate limits).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
