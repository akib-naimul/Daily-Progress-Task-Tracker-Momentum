name: Build Windows Desktop App

# Builds the Windows installer. Push a version tag (e.g. v0.1.0) to also
# publish a GitHub Release with the installer attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # electron-builder downloads its own Electron for packaging, so we skip
          # the electron npm package's binary download here — it isn't needed to
          # build the installer and can be flaky/rate-limited on CI.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Build desktop installer
        run: npm run desktop:build
        env:
          # Authenticates Electron download for electron-builder (avoids rate limits).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On a version tag, electron-builder publishes the installer (+ auto-update
      # metadata) to a GitHub Release itself (see the "publish" field in
      # package.json "build"). On manual runs it just uploads the artifact below.
      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error
